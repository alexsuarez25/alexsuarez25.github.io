<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diálogos con el Entorno — UP Guadalajara</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
}

h1 {
  font-size: 28px;
  margin-bottom: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 200px);
  gap: 20px;
  justify-content: center;
}

.card {
  background: #1e293b;
  padding: 30px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  background: #334155;
  transform: scale(1.05);
}

.hidden {
  display: none;
}

.back {
  margin-top: 20px;
  cursor: pointer;
  color: #38bdf8;
}
</style>

</head>
<body>

<div class="container">

  <h1>Diálogos con el Entorno</h1>

  <div id="menu" class="grid">
    <div class="card" onclick="openSection('proyectos')">Proyectos</div>
    <div class="card" onclick="openSection('cinov')">CINOV</div>
    <div class="card" onclick="openSection('aliados')">Aliados</div>
    <div class="card" onclick="openSection('investigacion')">Investigación</div>
  </div>

  <div id="content" class="hidden">
    <h2 id="title"></h2>
    <p id="text"></p>
    <div class="back" onclick="goBack()">← Volver</div>
  </div>

</div>

<script>
const data = {
  proyectos: "Aquí puedes agregar información de proyectos.",
  cinov: "Contenido del CINOV.",
  aliados: "Lista de aliados estratégicos.",
  investigacion: "Información sobre investigación."
};

function openSection(section) {
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("content").classList.remove("hidden");

  document.getElementById("title").innerText = section.toUpperCase();
  document.getElementById("text").innerText = data[section];
}

function goBack() {
  document.getElementById("menu").classList.remove("hidden");
  document.getElementById("content").classList.add("hidden");
}
</script>

</body>
</html>
